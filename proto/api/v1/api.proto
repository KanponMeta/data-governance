syntax = "proto3";
package api.v1;
option go_package = "github.com/kanpon/data-governance/proto/api/v1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============ Auth Service ============
service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc AcceptInvite(AcceptInviteRequest) returns (AcceptInviteResponse);
  rpc GetMe(google.protobuf.Empty) returns (UserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}
message RegisterResponse { string user_id = 1; string role = 2; }

message LoginRequest {
  string email = 1;
  string password = 2;
}
message LoginResponse {
  string access_token = 1;
  string token_type = 2;
  string expires_at = 3;
  string user_id = 4;
  string role = 5;
}

message AcceptInviteRequest {
  string token = 1;
  string password = 2;
}
message AcceptInviteResponse { string user_id = 1; }

message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  repeated string roles = 4;
  PermissionFlags permissions = 5;
}
message PermissionFlags {
  bool can_approve = 1;
  bool can_edit_policies = 2;
  bool can_manage_users = 3;
}

// ============ Asset Service ============
service AssetService {
  rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
  rpc GetAsset(GetAssetRequest) returns (AssetResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRun(GetRunRequest) returns (RunResponse);
}

message ListAssetsRequest {
  int32 page = 1;
  int32 page_size = 2;
}
message ListAssetsResponse {
  repeated AssetResponse assets = 1;
  int32 total = 2;
  int32 page = 3;
}
message AssetResponse {
  string name = 1;
  string state = 2;
  google.protobuf.Timestamp last_materialized_at = 3;
  string last_materialize_state = 4;
  repeated string tags = 5;
  string description = 6;
}

message GetAssetRequest { string name = 1; }

message ListRunsRequest {
  string asset_name = 1;
  int32 page = 2;
  int32 page_size = 3;
}
message ListRunsResponse {
  repeated RunResponse runs = 1;
  int32 total = 2;
}
message RunResponse {
  string id = 1;
  string asset_name = 2;
  string state = 3;
  google.protobuf.Timestamp queued_at = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp finished_at = 6;
  string quality_state = 7;
  repeated RunStepResponse steps = 8;
}
message RunStepResponse {
  string name = 1;
  string state = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp finished_at = 4;
  string error = 5;
}

message GetRunRequest { string run_id = 1; }

// ============ Lineage Service ============
service LineageService {
  rpc Neighborhood(NeighborhoodRequest) returns (NeighborhoodResponse);
  rpc Impact(ImpactRequest) returns (ImpactResponse);
}

message NeighborhoodRequest {
  string asset_id = 1;
  int32 depth = 2;
}
message NeighborhoodResponse {
  repeated AssetNode nodes = 1;
  repeated LineageEdge edges = 2;
}
message AssetNode {
  string id = 1;
  string name = 2;
  string type = 3;
  repeated ColumnInfo columns = 4;
}
message ColumnInfo {
  string name = 1;
  string type = 2;
}
message LineageEdge {
  string from_id = 1;
  string to_id = 2;
  string type = 3;
}

message ImpactRequest {
  string asset = 1;
  string direction = 2;
  int32 depth = 3;
  string column = 4;
}
message ImpactResponse {
  repeated string assets = 1;
  int32 total = 2;
}

// ============ Governance Service ============
service GovernanceService {
  rpc ListReviews(ListReviewsRequest) returns (ListReviewsResponse);
  rpc GetReview(GetReviewRequest) returns (ReviewResponse);
  rpc ApproveReview(ApproveReviewRequest) returns (ReviewResponse);
  rpc RejectReview(RejectReviewRequest) returns (ReviewResponse);
}

message ListReviewsRequest {
  string status = 1;
  int32 page = 2;
  int32 page_size = 3;
}
message ListReviewsResponse {
  repeated ReviewResponse reviews = 1;
  int32 total = 2;
}
message ReviewResponse {
  string id = 1;
  string asset_name = 2;
  string status = 3;
  string submitted_by = 4;
  google.protobuf.Timestamp submitted_at = 5;
  string reviewed_by = 6;
  google.protobuf.Timestamp reviewed_at = 7;
  repeated ReviewComment comments = 8;
}
message ReviewComment {
  string author = 1;
  string body = 2;
  google.protobuf.Timestamp created_at = 3;
}

message GetReviewRequest { string id = 1; }
message ApproveReviewRequest {
  string id = 1;
  string comment = 2;
}
message RejectReviewRequest {
  string id = 1;
  string comment = 2;
}

// ============ Admin Service ============
service AdminService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc AssignRole(AssignRoleRequest) returns (UserResponse);
  rpc RemoveRole(RemoveRoleRequest) returns (UserResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc CreateRole(CreateRoleRequest) returns (RoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc CreatePolicy(CreatePolicyRequest) returns (ColumnPolicyResponse);
  rpc UpdatePolicy(UpdatePolicyRequest) returns (ColumnPolicyResponse);
  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty);
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
}
message ListUsersResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
}

message AssignRoleRequest {
  string user_id = 1;
  string role = 2;
}
message RemoveRoleRequest {
  string user_id = 1;
  string role = 2;
}

message ListRolesRequest {}
message ListRolesResponse {
  repeated RoleResponse roles = 1;
}
message RoleResponse {
  string name = 1;
  string description = 2;
}

message CreateRoleRequest {
  string name = 1;
  string description = 2;
}
message DeleteRoleRequest {
  string name = 1;
}

message ListPoliciesRequest {}
message ListPoliciesResponse {
  repeated ColumnPolicyResponse policies = 1;
}
message ColumnPolicyResponse {
  string id = 1;
  string role = 2;
  string asset = 3;
  string column = 4;
  string action = 5;
}
message CreatePolicyRequest {
  string role = 1;
  string asset = 2;
  string column = 3;
  string action = 4;
}
message UpdatePolicyRequest {
  string id = 1;
  string role = 2;
  string asset = 3;
  string column = 4;
  string action = 5;
}
message DeletePolicyRequest {
  string id = 1;
}

// ============ Search Service ============
service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
}

message SearchRequest {
  string query = 1;
  string type = 2; // asset, column, or empty (all)
  string tag = 3;
  string owner = 4;
  int32 page = 5;
}
message SearchResult {
  string type = 1;       // "asset" or "column"
  string name = 2;
  string description = 3;
  string owner = 4;
  repeated string tags = 5;
  string asset_name = 6; // for columns: parent asset
  string highlight = 7;
}
message SearchResponse {
  repeated SearchResult results = 1;
  int32 total = 2;
  int32 page = 3;
  string query = 4;
  repeated string tags = 5;
  repeated string owners = 6;
}

// ============ Quality Service ============
service QualityService {
  rpc QualityTrend(QualityTrendRequest) returns (QualityTrendResponse);
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);
  rpc AcknowledgeAlert(AcknowledgeAlertRequest) returns (AcknowledgeAlertResponse);
}

message QualityTrendRequest {
  string asset_name = 1;
  int32 runs = 2;
}
message QualityTrendPoint {
  string run_id = 1;
  google.protobuf.Timestamp finished_at = 2;
  double score = 3;
  string state = 4;
  repeated RuleResult rule_results = 5;
}
message RuleResult {
  string rule_name = 1;
  bool passed = 2;
  string value = 3;
  string threshold = 4;
}
message QualityTrendResponse {
  repeated QualityTrendPoint points = 1;
  double avg_score = 2;
}

message ListAlertsRequest {}
message QualityAlert {
  string id = 1;
  string asset_name = 2;
  string rule_name = 3;
  string severity = 4;
  string message = 5;
  google.protobuf.Timestamp created_at = 6;
  bool acknowledged = 7;
}
message ListAlertsResponse {
  repeated QualityAlert alerts = 1;
}

message AcknowledgeAlertRequest { string id = 1; }
message AcknowledgeAlertResponse { bool acknowledged = 1; }