name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  GO_VERSION: '1.25'
  DATABASE_URL: postgres://platform:platform@localhost:5432/platform?sslmode=disable
  JWT_SIGNING_KEY: ci-signing-key-must-be-32-bytes-or-more-zzzzz

jobs:
  build-test:
    name: build-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install buf
        run: go install github.com/bufbuild/buf/cmd/buf@latest

      - name: Install atlas
        run: |
          curl -sSf https://atlasgo.sh | sh
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Proto lint
        run: cd internal/connector/proto && buf lint

      - name: Atlas migrate lint
        run: atlas migrate lint --env ci --latest 1 || true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Apply migrations
        run: atlas migrate apply --env ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Unit tests
        run: go test -race -count=1 ./...
        env:
          INTEGRATION_DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start platform for integration tests
        run: |
          go run ./cmd/platform start &
          echo "Waiting for platform to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Platform is ready"
              break
            fi
            sleep 1
          done

      - name: Integration tests
        run: go test -tags=integration -race -count=1 ./test/integration/...
        env:
          PLATFORM_URL: http://localhost:8080
          INTEGRATION_DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SIGNING_KEY: ${{ env.JWT_SIGNING_KEY }}
